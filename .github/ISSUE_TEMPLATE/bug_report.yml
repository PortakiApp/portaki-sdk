name: Bug report
description: Report a bug in the Portaki SDK or CLI
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Security issues? See [SECURITY.md](https://github.com/PortakiApp/portaki-sdk/blob/main/SECURITY.md).
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a failing command.
      placeholder: |
        1. portaki build --release
        2. …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: CLI version, crate version, or git SHA.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
