name: Node.js + npm cache — sdk/module-sdk
description: >
  Configure Node.js avec cache npm sur le package-lock du SDK JavaScript
  (dépôt portaki-sdk, dossier sdk/module-sdk par défaut — paquet @portaki/module-sdk).

inputs:
  node-version:
    description: Version Node.js
    required: true
  working-directory:
    description: Dossier du package npm (relatif au workspace)
    required: false
    default: sdk/module-sdk
  registry-url:
    description: Registry npm (vide = pas de registry-url dans setup-node)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Cache bucket UTC (validité 1 h)
      id: cache_ttl
      shell: bash
      run: echo "hour=$(date -u +%Y%m%d%H)" >> "$GITHUB_OUTPUT"

    - uses: actions/cache@v4
      with:
        path: ~/.npm
        key: npm-sdk-js-${{ runner.os }}-${{ hashFiles(format('{0}/package-lock.json', inputs.working-directory)) }}-${{ steps.cache_ttl.outputs.hour }}

    - name: Setup Node.js (registry)
      if: inputs.registry-url != ''
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}

    - name: Setup Node.js
      if: inputs.registry-url == ''
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
