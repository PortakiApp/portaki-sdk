name: Checkout portaki-sdk
description: >
  Clone le dépôt portaki-sdk (Maven/Java) sous le workspace courant, typiquement pour les dépôts
  consommateurs (ex. portaki-modules) qui buildent contre le SDK depuis la source.

inputs:
  path:
    description: Répertoire relatif au workspace (ex. .deps/portaki-sdk)
    required: false
    default: .deps/portaki-sdk
  repository:
    description: Dépôt GitHub owner/name du SDK
    required: false
    default: PortakiApp/portaki-sdk
  token:
    description: PAT ou GITHUB_TOKEN avec lecture du dépôt SDK
    required: true
  fetch-depth:
    description: Profondeur du clone (0 = historique complet)
    required: false
    default: "1"

runs:
  using: composite
  steps:
    - name: Checkout SDK
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.repository }}
        path: ${{ inputs.path }}
        token: ${{ inputs.token }}
        fetch-depth: ${{ inputs.fetch-depth }}
