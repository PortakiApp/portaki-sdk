name: Java SDK — Maven verify
description: >
  JDK Temurin + cache Maven (bucket UTC 1 h), puis mvn verify dans le répertoire du SDK Java
  (usage typique depuis la racine du dépôt portaki-sdk).

inputs:
  java-version:
    description: Version du JDK Temurin
    required: false
    default: "21"
  working-directory:
    description: Répertoire du projet Maven (relatif au workspace)
    required: false
    default: sdk/java

runs:
  using: composite
  steps:
    - name: Cache bucket UTC (validité 1 h)
      id: cache_ttl
      shell: bash
      run: echo "hour=$(date -u +%Y%m%d%H)" >> "$GITHUB_OUTPUT"

    - uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: m2-java-sdk-verify-${{ runner.os }}-${{ hashFiles(format('{0}/pom.xml', inputs.working-directory)) }}-${{ steps.cache_ttl.outputs.hour }}

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    - name: Maven verify
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: mvn -B -ntp verify
