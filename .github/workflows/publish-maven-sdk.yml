# Deploys app.portaki:portaki-module-sdk (sdk/java) to Central Portal snapshot host (SNAPSHOT) or staging API (release).
# ~/.m2/settings.xml server ossrh: Basic + usePreemptiveAuth (setup-java alone omits preemptive; Central may 401). No GPG for -SNAPSHOT.

name: publish-maven-sdk

run-name: publish-maven-sdk-${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "sdk/java/**"
      - ".github/workflows/publish-maven-sdk.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.3.0 or 0.3.0-SNAPSHOT). Empty keeps pom."
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: publish-maven-sdk-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"

jobs:
  publish:
    name: test-and-publish
    runs-on: ubuntu-latest
    env:
      MAVEN_SERVER_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      MAVEN_SERVER_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
    defaults:
      run:
        working-directory: sdk/java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require Maven Central token
        run: |
          if [ -z "${MAVEN_SERVER_USERNAME}" ] || [ -z "${MAVEN_SERVER_PASSWORD}" ]; then
            echo "::error::Set secrets OSSRH_USERNAME and OSSRH_TOKEN (Central Portal user token: https://central.sonatype.com/usertoken)."
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          server-id: ossrh
          server-username: MAVEN_SERVER_USERNAME
          server-password: MAVEN_SERVER_PASSWORD

      # setup-java does not set usePreemptiveAuth; Central snapshot deploy (GET metadata + PUT)
      # often returns 401 without preemptive Basic. Write ~/.m2/settings.xml explicitly.
      - name: Configure Maven Central (preemptive Basic)
        run: |
          python3 << 'PY'
          import os
          import pathlib
          import xml.sax.saxutils as x

          user = x.escape(os.environ["MAVEN_SERVER_USERNAME"])
          password = x.escape(os.environ["MAVEN_SERVER_PASSWORD"])
          settings = """<?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>ossrh</id>
                <username>{}</username>
                <password>{}</password>
                <configuration>
                  <httpConfiguration>
                    <all>
                      <usePreemptiveAuth>true</usePreemptiveAuth>
                    </all>
                  </httpConfiguration>
                </configuration>
              </server>
            </servers>
          </settings>
          """.format(user, password)
          path = pathlib.Path.home() / ".m2" / "settings.xml"
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(settings, encoding="utf-8")
          print("Wrote", path)
          PY

      - name: Version bump (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: >
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set
          "-DnewVersion=${{ github.event.inputs.version }}" -DgenerateBackupPoms=false

      - name: Project version
        id: project
        run: |
          V=$(mvn -B -ntp -q -DforceStdout help:evaluate -Dexpression=project.version | tr -d '\r\n')
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Tests and package (mvn verify)
        run: mvn -B -ntp verify

      - name: Deploy to Maven Central
        run: mvn -B -ntp deploy -DskipTests

      - name: Create GitHub Release (main, non-SNAPSHOT only)
        if: >
          success() &&
          github.ref == 'refs/heads/main' &&
          !contains(steps.project.outputs.version, 'SNAPSHOT')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.project.outputs.version }}"
          TAG="java-v${VERSION}"
          if gh release view "${TAG}" --json name 2>/dev/null; then
            echo "Release ${TAG} already exists, skipping."
          else
            gh release create "${TAG}" \
              --title "Java SDK ${TAG}" \
              --notes "Maven coordinates: \`app.portaki:portaki-module-sdk:${VERSION}\` (Maven Central)." \
              --target "${{ github.sha }}"
          fi
