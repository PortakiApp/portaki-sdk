# Publish app.portaki:portaki-module-sdk to Maven Central (Central Portal + central-publishing-maven-plugin).
#
# Publication automatisée depuis main (après tests) : voir sdk-release-main.yml (release GitHub + mvn deploy
# dans le même workflow — le GITHUB_TOKEN ne déclenche pas publish-maven-sdk sur l’événement release).
#
# Flow aligned with:
# https://medium.com/@jtbsorensen/publish-your-artifact-to-the-maven-central-repository-using-github-actions-15d3b5d9ce88
#
# That article uses secrets CENTRAL_TOKEN_*, GPG_SIGNING_KEY*. This repo uses:
#   OSSRH_USERNAME, OSSRH_TOKEN     (Central Portal user token — same role as CENTRAL_TOKEN_*)
#   GPG_PRIVATE_KEY, GPG_PASSPHRASE (armored private key + passphrase)
#
# Env names follow the article (MAVEN_USERNAME / MAVEN_PASSWORD / MAVEN_GPG_PASSPHRASE) for
# actions/setup-java server-id + GPG; values come from the Portaki secrets above.
#
# Création de release GitHub : en cas de **403 Resource not accessible by integration**, voir
# **docs/deployment.md** (réglages Actions, rulesets, secret optionnel **GH_RELEASE_PAT**).
# Requirements: https://central.sonatype.org/publish/requirements/
# Portal + Maven: https://central.sonatype.org/publish/publish-portal-maven/

name: publish-maven-sdk

run-name: publish-maven-sdk-${{ github.event_name }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.3.1). Empty keeps pom. No -SNAPSHOT."
        required: false
        default: ""
        type: string
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: publish-maven-sdk-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
  MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
  MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

jobs:
  publish:
    name: release-to-central
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'java-v'))
    defaults:
      run:
        working-directory: legacy/java
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Auth gh for release API
        run: |
          if [ -n "${{ secrets.GH_RELEASE_PAT }}" ]; then
            echo "GH_TOKEN=${{ secrets.GH_RELEASE_PAT }}" >> "$GITHUB_ENV"
          else
            echo "GH_TOKEN=${{ github.token }}" >> "$GITHUB_ENV"
          fi

      - name: Require Central Portal token
        run: |
          if [ -z "${MAVEN_USERNAME}" ] || [ -z "${MAVEN_PASSWORD}" ]; then
            echo "::error::Set repository secrets OSSRH_USERNAME and OSSRH_TOKEN (https://central.sonatype.org/publish/generate-portal-token/)."
            exit 1
          fi

      - name: Require GPG signing secrets
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE_CHECK: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "${GPG_PRIVATE_KEY}" ] || [ -z "${GPG_PASSPHRASE_CHECK}" ]; then
            echo "::error::Set secrets GPG_PRIVATE_KEY (armored) and GPG_PASSPHRASE (https://central.sonatype.org/publish/requirements/gpg/)."
            exit 1
          fi

      - name: Cache bucket UTC (validité 1 h)
        id: cache_ttl
        run: echo "hour=$(date -u +%Y%m%d%H)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-publish-maven-sdk-${{ runner.os }}-${{ hashFiles('legacy/java/**/pom.xml') }}-${{ steps.cache_ttl.outputs.hour }}

      - name: Set up JDK and Maven Central credentials
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Set version from release tag
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#java-v}"
          if [ "$VERSION" = "$TAG" ] || [ -z "$VERSION" ]; then
            echo "::error::Release tag must be java-v<semver> (got: ${TAG})"
            exit 1
          fi
          case "$VERSION" in *-SNAPSHOT*)
            echo "::error::SNAPSHOT versions are not published with this workflow."
            exit 1
            ;;
          esac
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set "-DnewVersion=${VERSION}" -DgenerateBackupPoms=false

      - name: Version bump (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          V="${{ github.event.inputs.version }}"
          case "$V" in *-SNAPSHOT*)
            echo "::error::SNAPSHOT versions are not published with this workflow."
            exit 1
            ;;
          esac
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set "-DnewVersion=${V}" -DgenerateBackupPoms=false

      - name: Project version
        id: project
        run: |
          V=$(mvn -B -ntp -q -DforceStdout help:evaluate -Dexpression=project.version | tr -d '\r\n')
          echo "version=$V" >> "$GITHUB_OUTPUT"
          case "$V" in *-SNAPSHOT*)
            echo "::error::POM version must not be a SNAPSHOT for Central release (got ${V})."
            exit 1
            ;;
          esac

      - name: Publish package to Maven Central
        run: mvn --batch-mode deploy -DskipTests -P central-deploy

      - name: Create GitHub Release (workflow_dispatch on main)
        if: success() && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        run: |
          VERSION="${{ steps.project.outputs.version }}"
          TAG="java-v${VERSION}"
          if gh release view "${TAG}" --json name 2>/dev/null; then
            echo "Release ${TAG} already exists, skipping."
          else
            gh release create "${TAG}" \
              --title "Java SDK ${TAG}" \
              --notes "Maven coordinates: \`app.portaki:portaki-module-sdk:${VERSION}\` ([Maven Central](https://central.sonatype.com/))." \
              --target "${{ github.sha }}"
          fi
