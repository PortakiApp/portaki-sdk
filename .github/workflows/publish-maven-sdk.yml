# Publie app.portaki:portaki-module-sdk (sdk/java) sur Maven Central via central-publishing-maven-plugin.
# Release 0.3.0+ : GPG + jeton Portal. Les PR gardent gpg.skip=true (ci-verify).

name: publish-maven-sdk

run-name: publish-maven-sdk-${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "sdk/java/**"
      - ".github/workflows/publish-maven-sdk.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.3.1). Empty keeps pom."
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: publish-maven-sdk-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"

jobs:
  publish:
    name: test-and-publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import GPG key (Maven Central signing)
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Version bump (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: >
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set
          "-DnewVersion=${{ github.event.inputs.version }}" -DgenerateBackupPoms=false

      - name: Project version
        id: project
        run: |
          V=$(mvn -B -ntp -q -DforceStdout help:evaluate -Dexpression=project.version | tr -d '\r\n')
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Tests and package (mvn verify, sign)
        run: mvn -B -ntp verify -Dgpg.skip=false

      - name: Configure Central Portal credentials (server id central)
        env:
          CENTRAL_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
        run: |
          python3 <<'PY'
          import os
          import pathlib
          import xml.sax.saxutils as xs

          u_raw = os.environ.get("CENTRAL_USERNAME", "").strip()
          p_raw = os.environ.get("CENTRAL_PASSWORD", "").strip()
          if not u_raw or not p_raw:
              raise SystemExit(
                  "OSSRH_USERNAME and OSSRH_TOKEN must be set to a Central Portal user token "
                  "(https://central.sonatype.com/usertoken)."
              )

          u = xs.escape(u_raw)
          p = xs.escape(p_raw)
          root = pathlib.Path.home() / ".m2"
          root.mkdir(parents=True, exist_ok=True)
          xml = f'''<?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0">
            <servers>
              <server>
                <id>central</id>
                <username>{u}</username>
                <password>{p}</password>
              </server>
            </servers>
          </settings>
          '''
          (root / "settings.xml").write_text(xml)
          PY

      - name: Deploy to Maven Central
        run: mvn -B -ntp deploy -DskipTests -Dgpg.skip=false

      - name: Create GitHub Release (main, non-SNAPSHOT only)
        if: >
          success() &&
          github.ref == 'refs/heads/main' &&
          !contains(steps.project.outputs.version, 'SNAPSHOT')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.project.outputs.version }}"
          TAG="java-v${VERSION}"
          if gh release view "${TAG}" --json name 2>/dev/null; then
            echo "Release ${TAG} already exists, skipping."
          else
            gh release create "${TAG}" \
              --title "Java SDK ${TAG}" \
              --notes "Maven coordinates: \`app.portaki:portaki-module-sdk:${VERSION}\` (Maven Central)." \
              --target "${{ github.sha }}"
          fi
