# Deploys app.portaki:portaki-module-sdk (sdk/java) to OSSRH / Maven Central.

name: publish-maven-sdk

run-name: publish-maven-sdk-${{ github.event_name }}

on:
  push:
    branches: [develop]
    paths:
      - "sdk/java/**"
      - ".github/workflows/publish-maven-sdk.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.2.2 or 0.2.2-SNAPSHOT). Empty keeps pom."
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: publish-maven-sdk-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Version bump (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: >
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set
          "-DnewVersion=${{ github.event.inputs.version }}" -DgenerateBackupPoms=false

      - name: Version bump (GitHub release)
        if: github.event_name == 'release'
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          RAW="${TAG#java-v}"
          RAW="${RAW#sdk-java-v}"
          RAW="${RAW#v}"
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set "-DnewVersion=${RAW}" -DgenerateBackupPoms=false

      - name: Configure OSSRH credentials
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
        run: |
          python3 <<'PY'
          import os
          import pathlib
          import xml.sax.saxutils as xs

          root = pathlib.Path.home() / ".m2"
          root.mkdir(parents=True, exist_ok=True)
          u = xs.escape(os.environ["OSSRH_USERNAME"])
          p = xs.escape(os.environ["OSSRH_TOKEN"])
          xml = f'''<?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0">
            <servers>
              <server>
                <id>ossrh</id>
                <username>{u}</username>
                <password>{p}</password>
              </server>
            </servers>
          </settings>
          '''
          (root / "settings.xml").write_text(xml)
          PY

      - name: Deploy
        run: mvn -B -ntp deploy
