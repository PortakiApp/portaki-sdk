# Release app.portaki:portaki-module-sdk to Maven Central via central-publishing-maven-plugin.
# GitHub tutorial (setup-java + secrets; examples are OSSRH legacy): https://docs.github.com/en/actions/tutorials/publish-packages/publish-java-packages-with-maven
# Requirements: https://central.sonatype.org/publish/requirements/
# Portal + Maven: https://central.sonatype.org/publish/publish-portal-maven/
# After setup-java, settings.xml adds Bearer base64(user:pass) for Portal API (see central.sonatype.org publish-portal-api).

name: publish-maven-sdk

run-name: publish-maven-sdk-${{ github.event_name }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.3.1). Empty keeps pom. No -SNAPSHOT."
        required: false
        default: ""
        type: string
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: publish-maven-sdk-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"

jobs:
  publish:
    name: release-to-central
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'java-v'))
    env:
      MAVEN_SERVER_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      MAVEN_SERVER_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    defaults:
      run:
        working-directory: sdk/java
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Require Central Portal token
        run: |
          if [ -z "${MAVEN_SERVER_USERNAME}" ] || [ -z "${MAVEN_SERVER_PASSWORD}" ]; then
            echo "::error::Set secrets OSSRH_USERNAME and OSSRH_TOKEN (https://central.sonatype.org/publish/generate-portal-token/)."
            exit 1
          fi

      - name: Require GPG signing secrets
        run: |
          if [ -z "${GPG_PRIVATE_KEY}" ] || [ -z "${GPG_PASSPHRASE}" ]; then
            echo "::error::Set secrets GPG_PRIVATE_KEY (armored) and GPG_PASSPHRASE (https://central.sonatype.org/publish/requirements/gpg/)."
            exit 1
          fi

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          server-id: central
          server-username: MAVEN_SERVER_USERNAME
          server-password: MAVEN_SERVER_PASSWORD

      - name: Maven settings — Bearer for Portal API (server central)
        run: |
          python3 << 'PY'
          import base64
          import os
          import pathlib
          import xml.sax.saxutils as x

          user = os.environ["MAVEN_SERVER_USERNAME"]
          password = os.environ["MAVEN_SERVER_PASSWORD"]
          bearer_raw = "Bearer " + base64.b64encode(
              f"{user}:{password}".encode("utf-8")
          ).decode("ascii")
          bearer = x.escape(bearer_raw)
          settings = """<?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>{}</username>
                <password>{}</password>
                <configuration>
                  <httpHeaders>
                    <property>
                      <name>Authorization</name>
                      <value>{}</value>
                    </property>
                  </httpHeaders>
                </configuration>
              </server>
            </servers>
          </settings>
          """.format(x.escape(user), x.escape(password), bearer)
          path = pathlib.Path.home() / ".m2" / "settings.xml"
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(settings, encoding="utf-8")
          PY

      - name: Version bump (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          V="${{ github.event.inputs.version }}"
          case "$V" in *-SNAPSHOT*)
            echo "::error::SNAPSHOT versions are not published with this workflow."
            exit 1
            ;;
          esac
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set "-DnewVersion=${V}" -DgenerateBackupPoms=false

      - name: Project version
        id: project
        run: |
          V=$(mvn -B -ntp -q -DforceStdout help:evaluate -Dexpression=project.version | tr -d '\r\n')
          echo "version=$V" >> "$GITHUB_OUTPUT"
          case "$V" in *-SNAPSHOT*)
            echo "::error::POM version must not be a SNAPSHOT for Central release (got ${V})."
            exit 1
            ;;
          esac

      - name: Deploy to Maven Central
        run: mvn -B -ntp deploy -DskipTests -Dcentral.deploy=true

      - name: Create GitHub Release (workflow_dispatch on main)
        if: success() && github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.project.outputs.version }}"
          TAG="java-v${VERSION}"
          if gh release view "${TAG}" --json name 2>/dev/null; then
            echo "Release ${TAG} already exists, skipping."
          else
            gh release create "${TAG}" \
              --title "Java SDK ${TAG}" \
              --notes "Maven coordinates: \`app.portaki:portaki-module-sdk:${VERSION}\` ([Maven Central](https://central.sonatype.com/))." \
              --target "${{ github.sha }}"
          fi
