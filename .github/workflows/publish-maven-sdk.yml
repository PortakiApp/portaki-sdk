# Deploys app.portaki:portaki-module-sdk (sdk/java) to OSSRH / Maven Central.
# Runs tests, then deploy. On branch main, creates a GitHub Release for non-SNAPSHOT versions.

name: publish-maven-sdk

run-name: publish-maven-sdk-${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "sdk/java/**"
      - ".github/workflows/publish-maven-sdk.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.3.0 or 0.3.0-SNAPSHOT). Empty keeps pom."
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: publish-maven-sdk-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"

jobs:
  publish:
    name: test-and-publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Version bump (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: >
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set
          "-DnewVersion=${{ github.event.inputs.version }}" -DgenerateBackupPoms=false

      - name: Project version
        id: project
        run: |
          V=$(mvn -B -ntp -q -DforceStdout help:evaluate -Dexpression=project.version | tr -d '\r\n')
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Tests and package (mvn verify)
        run: mvn -B -ntp verify

      - name: Configure Maven Central credentials (Portal user token, server id ossrh)
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
        run: |
          python3 <<'PY'
          import base64
          import os
          import pathlib
          import xml.sax.saxutils as xs

          u_raw = os.environ.get("OSSRH_USERNAME", "").strip()
          p_raw = os.environ.get("OSSRH_TOKEN", "").strip()
          if not u_raw or not p_raw:
              raise SystemExit(
                  "OSSRH_USERNAME and OSSRH_TOKEN must be set to a Central Portal user token "
                  "(https://central.sonatype.com/usertoken). Legacy OSSRH passwords will not work."
              )

          bearer = base64.b64encode(f"{u_raw}:{p_raw}".encode("utf-8")).decode("ascii")
          bearer_header = xs.escape(f"Bearer {bearer}")

          root = pathlib.Path.home() / ".m2"
          root.mkdir(parents=True, exist_ok=True)
          xml = f'''<?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0">
            <servers>
              <server>
                <id>ossrh</id>
                <configuration>
                  <httpHeaders>
                    <property>
                      <name>Authorization</name>
                      <value>{bearer_header}</value>
                    </property>
                  </httpHeaders>
                </configuration>
              </server>
            </servers>
          </settings>
          '''
          (root / "settings.xml").write_text(xml)
          PY

      - name: Deploy to Maven Central
        run: mvn -B -ntp deploy -DskipTests

      - name: Create GitHub Release (main, non-SNAPSHOT only)
        if: >
          success() &&
          github.ref == 'refs/heads/main' &&
          !contains(steps.project.outputs.version, 'SNAPSHOT')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.project.outputs.version }}"
          TAG="java-v${VERSION}"
          if gh release view "${TAG}" --json name 2>/dev/null; then
            echo "Release ${TAG} already exists, skipping."
          else
            gh release create "${TAG}" \
              --title "Java SDK ${TAG}" \
              --notes "Maven coordinates: \`app.portaki:portaki-module-sdk:${VERSION}\` (OSSRH / Maven Central)." \
              --target "${{ github.sha }}"
          fi
