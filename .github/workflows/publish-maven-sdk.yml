# Deploys app.portaki:portaki-module-sdk (sdk/java) to Central Portal snapshot host (SNAPSHOT) or staging API (release).
# Doc: https://central.sonatype.org/publish/publish-portal-maven/
# Maven server ossrh via actions/setup-java (MAVEN_SERVER_* env names). No GPG for -SNAPSHOT.

name: publish-maven-sdk

run-name: publish-maven-sdk-${{ github.event_name }}

on:
  push:
    branches: [main]
    paths:
      - "sdk/java/**"
      - ".github/workflows/publish-maven-sdk.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.3.0 or 0.3.0-SNAPSHOT). Empty keeps pom."
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: publish-maven-sdk-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"

jobs:
  publish:
    name: test-and-publish
    runs-on: ubuntu-latest
    env:
      MAVEN_SERVER_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      MAVEN_SERVER_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
    defaults:
      run:
        working-directory: sdk/java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require Maven Central token
        run: |
          if [ -z "${MAVEN_SERVER_USERNAME}" ] || [ -z "${MAVEN_SERVER_PASSWORD}" ]; then
            echo "::error::Set secrets OSSRH_USERNAME and OSSRH_TOKEN (Central Portal user token: https://central.sonatype.com/usertoken)."
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          server-id: ossrh
          server-username: MAVEN_SERVER_USERNAME
          server-password: MAVEN_SERVER_PASSWORD

      - name: Version bump (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: >
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set
          "-DnewVersion=${{ github.event.inputs.version }}" -DgenerateBackupPoms=false

      - name: Project version
        id: project
        run: |
          V=$(mvn -B -ntp -q -DforceStdout help:evaluate -Dexpression=project.version | tr -d '\r\n')
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Tests and package (mvn verify)
        run: mvn -B -ntp verify

      - name: Deploy to Maven Central
        run: mvn -B -ntp deploy -DskipTests

      - name: Create GitHub Release (main, non-SNAPSHOT only)
        if: >
          success() &&
          github.ref == 'refs/heads/main' &&
          !contains(steps.project.outputs.version, 'SNAPSHOT')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.project.outputs.version }}"
          TAG="java-v${VERSION}"
          if gh release view "${TAG}" --json name 2>/dev/null; then
            echo "Release ${TAG} already exists, skipping."
          else
            gh release create "${TAG}" \
              --title "Java SDK ${TAG}" \
              --notes "Maven coordinates: \`app.portaki:portaki-module-sdk:${VERSION}\` (Maven Central)." \
              --target "${{ github.sha }}"
          fi
