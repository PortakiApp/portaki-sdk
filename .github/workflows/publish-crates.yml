name: Publish crates.io

# Runs after release-please creates tag vX.Y.Z (push tag).
# Auth: Trusted Publishing OIDC — rust-lang/crates-io-auth-action.
# Workspace order: cargo-workspaces (topological `cargo ws publish`).
#
# Bootstrap (once per crate, before OIDC works):
#   1. Publish manually with a crates.io API token (see docs/RELEASE.md)
#   2. crates.io → Settings → Trusted Publishing → Add GitHub
#      owner: PortakiApp, repo: portaki-sdk, workflow: publish-crates.yml
on:
  push:
    tags:
      - "v*"
  # Resume a partial publish (e.g. after a mid-workspace failure) without retagging.
  workflow_dispatch:

concurrency:
  group: publish-crates.io
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces --version 0.4.2 --locked

      - id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish workspace crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          cargo ws publish \
            --publish-as-is \
            --publish-interval 15 \
            --yes
