# Après un **ci-verify** vert sur `main` : détecte les changements SDK dans le commit, vérifie Java/JS,
# puis publie (Maven Central + npm) et crée les releases GitHub — plus de parallèle avec la CI.
#
# Prérequis : bump sdk/java/pom.xml et sdk/module-sdk/package.json avant merge.
# Déclenchement manuel : workflow_dispatch (même branche que le bouton Actions, en général main).
#
# GITHUB_TOKEN ne chaîne pas les workflows entre eux : on utilise workflow_run sur ci-verify.
name: SDK release (main)

run-name: sdk-release-${{ github.run_id }}

on:
  workflow_run:
    workflows: [ci-verify]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: sdk-release-main-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "24"
  MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
  MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
  MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.pro.outputs.proceed }}
      head_sha: ${{ steps.pro.outputs.head_sha }}
      java: ${{ steps.paths.outputs.java }}
      module_sdk: ${{ steps.paths.outputs.module_sdk }}
      guest: ${{ steps.paths.outputs.guest }}
    steps:
      - id: pro
        env:
          WR_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WR_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WR_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "head_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${WR_CONCLUSION}" != "success" ] || [ "${WR_BRANCH}" != "main" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
            echo "java=false" >> "$GITHUB_OUTPUT"
            echo "module_sdk=false" >> "$GITHUB_OUTPUT"
            echo "guest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"
          echo "head_sha=${WR_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout (path filter)
        if: steps.pro.outputs.proceed == 'true' && github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pro.outputs.head_sha }}
          fetch-depth: 1

      - id: paths
        if: steps.pro.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "java=true" >> "$GITHUB_OUTPUT"
            echo "module_sdk=true" >> "$GITHUB_OUTPUT"
            echo "guest=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          java=false
          module_sdk=false
          guest=false
          while IFS= read -r f; do
            [ -z "${f}" ] && continue
            case "${f}" in
              sdk/java/*|.github/actions/*|.github/scripts/*|.github/workflows/sdk-release-main.yml|package.json|pnpm-workspace.yaml)
                java=true
                ;;
            esac
            case "${f}" in
              sdk/module-sdk/*|.github/actions/*|.github/workflows/sdk-release-main.yml|package.json|pnpm-workspace.yaml)
                module_sdk=true
                ;;
            esac
            case "${f}" in
              sdk/guest/*|.github/actions/*|.github/workflows/sdk-release-main.yml|package.json|pnpm-workspace.yaml)
                guest=true
                ;;
            esac
          done < <(git show --pretty="" --name-only HEAD)
          echo "java=${java}" >> "$GITHUB_OUTPUT"
          echo "module_sdk=${module_sdk}" >> "$GITHUB_OUTPUT"
          echo "guest=${guest}" >> "$GITHUB_OUTPUT"

  verify-java:
    name: verify-java
    needs: [gate]
    if: needs.gate.outputs.proceed == 'true' && needs.gate.outputs.java == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/java
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.head_sha }}

      - name: Java SDK — Maven verify
        uses: ./.github/actions/java-sdk-verify
        with:
          java-version: ${{ env.JAVA_VERSION }}

  verify-module-sdk:
    name: verify-module-sdk
    needs: [gate]
    if: needs.gate.outputs.proceed == 'true' && needs.gate.outputs.module_sdk == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/module-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.head_sha }}

      - name: Setup Node.js (sdk/module-sdk)
        uses: ./.github/actions/nodejs-npm-sdk-javascript
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test (if defined)
        run: npm run test --if-present

  verify-guest:
    name: verify-guest
    needs: [gate]
    if: needs.gate.outputs.proceed == 'true' && needs.gate.outputs.guest == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js (workspace)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Build @portaki/sdk
        run: pnpm --filter @portaki/sdk run build

  release-publish-java:
    name: release-publish-java
    needs: [gate, verify-java]
    if: always() && needs.gate.outputs.proceed == 'true' && needs.gate.outputs.java == 'true' && needs.verify-java.result == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/java
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.head_sha }}
          fetch-depth: 0

      - name: Require Central + GPG secrets
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -z "${MAVEN_USERNAME}" ] || [ -z "${MAVEN_PASSWORD}" ]; then
            echo "::error::Secrets OSSRH_USERNAME / OSSRH_TOKEN manquants pour Maven Central."
            exit 1
          fi
          if [ -z "${GPG_PRIVATE_KEY}" ] || [ -z "${MAVEN_GPG_PASSPHRASE}" ]; then
            echo "::error::Secrets GPG_PRIVATE_KEY / GPG_PASSPHRASE manquants."
            exit 1
          fi

      - name: Project version
        id: project
        run: |
          V=$(mvn -B -ntp -q -DforceStdout help:evaluate -Dexpression=project.version | tr -d '\r\n')
          echo "version=$V" >> "$GITHUB_OUTPUT"
          case "$V" in *-SNAPSHOT*)
            echo "::error::Version SNAPSHOT interdite pour Central (${V})."
            exit 1
            ;;
          esac

      - name: Skip if release already exists
        id: skip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.project.outputs.version }}"
          TAG="java-v${V}"
          if gh release view "${TAG}" --json name >/dev/null 2>&1; then
            echo "Release ${TAG} déjà présente — rien à publier (bump le pom pour une nouvelle série)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Previous tag for release notes
        if: steps.skip.outputs.skip != 'true'
        id: prev
        run: |
          V="${{ steps.project.outputs.version }}"
          PREV="$(python3 "$GITHUB_WORKSPACE/.github/scripts/sdk_prev_release_tag.py" "java-v" "${V}")"
          echo "prev_tag=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK and Maven Central
        if: steps.skip.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Publish to Maven Central
        if: steps.skip.outputs.skip != 'true'
        run: mvn --batch-mode deploy -DskipTests -P central-deploy

      - name: Create GitHub Release
        if: steps.skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.project.outputs.version }}"
          TAG="java-v${V}"
          PREV="${{ steps.prev.outputs.prev_tag }}"
          ARGS=(--target "${{ needs.gate.outputs.head_sha }}" --title "Java SDK ${TAG}" --generate-notes)
          if [ -n "${PREV}" ]; then
            ARGS+=(--notes-start-tag "${PREV}")
          fi
          gh release create "${TAG}" "${ARGS[@]}"

  release-publish-javascript:
    name: release-publish-javascript
    needs: [gate, verify-module-sdk]
    if: always() && needs.gate.outputs.proceed == 'true' && needs.gate.outputs.module_sdk == 'true' && needs.verify-module-sdk.result == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/module-sdk
    env:
      NPM_REGISTRY: https://registry.npmjs.org
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.head_sha }}
          fetch-depth: 0

      - name: Read package version
        id: pkg
        run: |
          V="$(node -p "require('./package.json').version")"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: skip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.pkg.outputs.version }}"
          TAG="javascript-v${V}"
          if gh release view "${TAG}" --json name >/dev/null 2>&1; then
            echo "Release ${TAG} déjà présente — bump sdk/module-sdk/package.json pour republier."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Previous tag for release notes
        if: steps.skip.outputs.skip != 'true'
        id: prev
        run: |
          V="${{ steps.pkg.outputs.version }}"
          PREV="$(python3 "$GITHUB_WORKSPACE/.github/scripts/sdk_prev_release_tag.py" "javascript-v" "${V}")"
          echo "prev_tag=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js (sdk/module-sdk)
        if: steps.skip.outputs.skip != 'true'
        uses: ./.github/actions/nodejs-npm-sdk-javascript
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY }}

      - name: Install dependencies
        if: steps.skip.outputs.skip != 'true'
        run: npm ci

      - name: Build
        if: steps.skip.outputs.skip != 'true'
        run: npm run build

      - name: Publish to npmjs
        if: steps.skip.outputs.skip != 'true'
        run: npm publish --access public

      - name: Create GitHub Release
        if: steps.skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.pkg.outputs.version }}"
          TAG="javascript-v${V}"
          PREV="${{ steps.prev.outputs.prev_tag }}"
          ARGS=(--target "${{ needs.gate.outputs.head_sha }}" --title "JavaScript SDK ${TAG}" --generate-notes)
          if [ -n "${PREV}" ]; then
            ARGS+=(--notes-start-tag "${PREV}")
          fi
          gh release create "${TAG}" "${ARGS[@]}"
