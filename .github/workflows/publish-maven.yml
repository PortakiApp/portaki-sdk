name: Publish Java (GitHub Packages)

on:
  push:
    branches: [develop]
    paths:
      - 'java/**'
      - '.github/workflows/publish-maven.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0). SNAPSHOT allowed (e.g. 0.2.0-SNAPSHOT).'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-maven-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Maven deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set version (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: >
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set
          "-DnewVersion=${{ github.event.inputs.version }}" -DgenerateBackupPoms=false

      - name: Set version from release tag
        if: github.event_name == 'release'
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          RAW="${TAG#java-v}"
          RAW="${RAW#v}"
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set "-DnewVersion=${RAW}" -DgenerateBackupPoms=false

      - name: Configure Maven for GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Deploy to GitHub Packages
        run: >
          mvn -B -ntp deploy
          -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ github.repository }}
