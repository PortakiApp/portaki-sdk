name: Publish Java SDK (Maven Central — OSSRH)

on:
  push:
    branches: [develop]
    paths:
      - "sdk/java/**"
      - ".github/workflows/publish-maven.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0). SNAPSHOT allowed (e.g. 0.2.0-SNAPSHOT)."
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: publish-maven-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Maven deploy — portaki-module-sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/java

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set version (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: >
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set
          "-DnewVersion=${{ github.event.inputs.version }}" -DgenerateBackupPoms=false

      - name: Set version from release tag
        if: github.event_name == 'release'
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          RAW="${TAG#java-v}"
          RAW="${RAW#sdk-java-v}"
          RAW="${RAW#v}"
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set "-DnewVersion=${RAW}" -DgenerateBackupPoms=false

      - name: Configure Maven for OSSRH (Sonatype)
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
        run: |
          python3 <<'PY'
          import os
          import pathlib
          import xml.sax.saxutils as xs

          root = pathlib.Path.home() / ".m2"
          root.mkdir(parents=True, exist_ok=True)
          u = xs.escape(os.environ["OSSRH_USERNAME"])
          p = xs.escape(os.environ["OSSRH_TOKEN"])
          xml = f'''<?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0">
            <servers>
              <server>
                <id>ossrh</id>
                <username>{u}</username>
                <password>{p}</password>
              </server>
            </servers>
          </settings>
          '''
          (root / "settings.xml").write_text(xml)
          PY

      - name: Deploy to Maven Central (staging / snapshots)
        run: mvn -B -ntp deploy
