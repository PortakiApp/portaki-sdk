# Publishes @portaki/sdk (folder packages/sdk) to registry.npmjs.org.
# Version: bump dans packages/sdk/package.json côté dépôt (pas dans la CI).

name: publish-npm-sdk

run-name: publish-npm-sdk-${{ github.event_name }}

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-sdk-${{ github.ref }}
  cancel-in-progress: true

env:
  # Node 24 bundles npm 11.5.x+ — Trusted Publishing (OIDC) needs npm CLI >= 11.5.1 (no extra npm install step).
  NODE_VERSION: "24"
  NPM_REGISTRY: https://registry.npmjs.org

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    # Évite de lancer ce workflow sur une release Maven ou autre tag sans lien avec le SDK JS.
    if: >
      github.event_name != 'release' ||
      startsWith(github.event.release.tag_name, 'javascript-v') ||
      startsWith(github.event.release.tag_name, 'js-v') ||
      startsWith(github.event.release.tag_name, 'sdk-js-v')
    defaults:
      run:
        working-directory: packages/sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (packages/sdk)
        uses: ./.github/actions/nodejs-npm-sdk-javascript
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Trusted Publishing (OIDC): bundled npm from Node 24 — no NPM_TOKEN secret.
      - name: Publish
        run: npm publish --access public
