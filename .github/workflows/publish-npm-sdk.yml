# Publishes @portaki/module-sdk (folder sdk/javascript) to registry.npmjs.org.

name: publish-npm-sdk

run-name: publish-npm-sdk-${{ github.event_name }}

on:
  push:
    branches: [develop]
    paths:
      - "sdk/javascript/**"
      - ".github/workflows/publish-npm-sdk.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Semver (e.g. 0.2.0). Empty keeps package.json."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-sdk-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  NPM_REGISTRY: https://registry.npmjs.org

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/javascript
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY }}

      - name: Install dependencies
        run: npm ci

      - name: Version bump (push to develop)
        if: github.event_name == 'push'
        shell: bash
        run: |
          BASE="$(node -p "require('./package.json').version.replace(/[-+].*$/,'')")"
          MM="${BASE%.*}"
          npm version "${MM}.${{ github.run_number }}" --no-git-tag-version --allow-same-version

      - name: Version bump (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: npm version "${{ github.event.inputs.version }}" --no-git-tag-version --allow-same-version

      - name: Version bump (GitHub release)
        if: github.event_name == 'release'
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          RAW="${TAG#javascript-v}"
          RAW="${RAW#js-v}"
          RAW="${RAW#sdk-js-v}"
          RAW="${RAW#v}"
          npm version "$RAW" --no-git-tag-version --allow-same-version

      - name: Build
        run: npm run build

      # Trusted Publishing (OIDC) requires npm CLI >= 11.5.1 — no NPM_TOKEN secret.
      # Install npm 11 into an isolated prefix (never `npm i -g npm` without --prefix: it corrupts hostedtoolcache npm).
      - name: Install npm 11 for OIDC (side-by-side prefix)
        shell: bash
        run: |
          set -euo pipefail
          ROOT="${RUNNER_TEMP}/npm-11-root"
          npm install -g npm@11.5.1 --prefix "$ROOT"
          echo "NPM_OIDC_BIN=${ROOT}/bin" >> "$GITHUB_ENV"
          "${ROOT}/bin/npm" --version

      - name: Publish
        shell: bash
        run: |
          export PATH="${NPM_OIDC_BIN}:$PATH"
          npm publish --access public
