name: Bootstrap crates.io publish

# One-shot: first publish with CARGO_REGISTRY_TOKEN, then delete this workflow + secret.
on:
  workflow_dispatch:

concurrency:
  group: publish-crates.io
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          publish-delay: 15000
