# Continuous verification: SDK JS/Java. Guest modules live in portaki-modules.
# Job IDs are stable slugs for branch protection / required checks.

name: ci-verify

run-name: verify-${{ github.ref_name }}

on:
  push:
    branches: [main, develop]
    paths:
      - "sdk/**"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/ci-verify.yml"
      - ".github/actions/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "sdk/**"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/ci-verify.yml"
      - ".github/actions/**"

permissions:
  contents: read

concurrency:
  group: ci-verify-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "21"

jobs:
  detect_changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      sdk_module_sdk: ${{ steps.paths.outputs.sdk_module_sdk }}
      sdk_guest: ${{ steps.paths.outputs.sdk_guest }}
      sdk_java: ${{ steps.paths.outputs.sdk_java }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Paths filter
        uses: dorny/paths-filter@v3
        id: paths
        with:
          filters: |
            sdk_module_sdk:
              - 'sdk/module-sdk/**'
              - '.github/workflows/ci-verify.yml'
              - '.github/actions/**'
            sdk_guest:
              - 'sdk/guest/**'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/ci-verify.yml'
              - '.github/actions/**'
            sdk_java:
              - 'sdk/java/**'
              - '.github/workflows/ci-verify.yml'
              - '.github/actions/**'

  sdk_module_sdk:
    name: sdk-module-sdk
    needs: detect_changes
    if: needs.detect_changes.outputs.sdk_module_sdk == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/module-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (sdk/module-sdk)
        uses: ./.github/actions/nodejs-npm-sdk-javascript
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test (if defined)
        run: npm run test --if-present

  sdk_guest:
    name: sdk-guest
    needs: detect_changes
    if: needs.detect_changes.outputs.sdk_guest == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js (workspace)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      - name: Build @portaki/sdk
        run: pnpm --filter @portaki/sdk run build

  sdk_java:
    name: sdk-java
    needs: detect_changes
    if: needs.detect_changes.outputs.sdk_java == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/java
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java SDK — Maven verify
        uses: ./.github/actions/java-sdk-verify
        with:
          java-version: ${{ env.JAVA_VERSION }}
