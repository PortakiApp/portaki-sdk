# Publishes @portaki/module-* packages under packages/ (manual dispatch).

name: publish-npm-packages

run-name: publish-npm-packages-${{ github.run_id }}

on:
  workflow_dispatch:
    inputs:
      npm_package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - all
          - "@portaki/module-train"
          - "@portaki/module-events"
          - "@portaki/module-rules"
          - "@portaki/module-appliances"
          - "@portaki/module-checklist"
          - "@portaki/module-pre-arrival-form"

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"
  NPM_REGISTRY: https://registry.npmjs.org

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Trusted Publishing (OIDC): pnpm publish delegates to npm >= 11.5.1 — no NPM_TOKEN secret.
      # Install npm 11 into an isolated prefix (never `npm i -g npm` without --prefix: it corrupts hostedtoolcache npm).
      - name: Install npm 11 for OIDC (side-by-side prefix)
        shell: bash
        run: |
          set -euo pipefail
          ROOT="${RUNNER_TEMP}/npm-11-root"
          npm install -g npm@11.5.1 --prefix "$ROOT"
          echo "NPM_OIDC_BIN=${ROOT}/bin" >> "$GITHUB_ENV"
          "${ROOT}/bin/npm" --version

      - name: Publish
        shell: bash
        run: |
          set -euo pipefail
          export PATH="${NPM_OIDC_BIN}:$PATH"
          TARGET="${{ github.event.inputs.npm_package }}"
          publish_one() {
            pnpm publish --filter "$1" --access public --no-git-checks
          }
          if [ "$TARGET" = "all" ]; then
            publish_one "@portaki/module-train"
            publish_one "@portaki/module-events"
            publish_one "@portaki/module-rules"
            publish_one "@portaki/module-appliances"
            publish_one "@portaki/module-checklist"
            publish_one "@portaki/module-pre-arrival-form"
          else
            publish_one "$TARGET"
          fi
