# Publishes @portakiapp/module-* packages under packages/ (manual dispatch).

name: publish-npm-packages

run-name: publish-npm-packages-${{ github.run_id }}

on:
  workflow_dispatch:
    inputs:
      npm_package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - all
          - "@portakiapp/module-train"
          - "@portakiapp/module-events"
          - "@portakiapp/module-rules"
          - "@portakiapp/module-appliances"
          - "@portakiapp/module-checklist"
          - "@portakiapp/module-pre-arrival-form"

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.4"
  NPM_REGISTRY: https://registry.npmjs.org

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          TARGET="${{ github.event.inputs.npm_package }}"
          publish_one() {
            pnpm publish --filter "$1" --access public --no-git-checks
          }
          if [ "$TARGET" = "all" ]; then
            publish_one "@portakiapp/module-train"
            publish_one "@portakiapp/module-events"
            publish_one "@portakiapp/module-rules"
            publish_one "@portakiapp/module-appliances"
            publish_one "@portakiapp/module-checklist"
            publish_one "@portakiapp/module-pre-arrival-form"
          else
            publish_one "$TARGET"
          fi
