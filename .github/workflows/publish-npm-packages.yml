# Publie les @portaki/module-* sous packages/ — une ligne de matrice par paquet (parallèle si "all").
# Version: bump dans chaque packages/<nom>/package.json (pas dans la CI).

name: publish-npm-packages

run-name: publish-npm-packages-${{ github.run_id }}

on:
  workflow_dispatch:
    inputs:
      npm_package:
        description: "Package à publier"
        required: true
        type: choice
        options:
          # Aligné sur portaki-api OfficialModuleCatalogAdapter.ORDERED_IDS (+ "all")
          - all
          - "@portaki/module-train"
          - "@portaki/module-events"
          - "@portaki/module-checklist"
          - "@portaki/module-rules"
          - "@portaki/module-appliances"
          - "@portaki/module-facility-hours"
          - "@portaki/module-wifi-guest"
          - "@portaki/module-waste-recycling"
          - "@portaki/module-local-guide"
          - "@portaki/module-weather"
          - "@portaki/module-access-guide"
          - "@portaki/module-emergency-contacts"
          - "@portaki/module-pre-arrival-form"
          - "@portaki/module-ical-sync"

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9.15.4"
  NPM_REGISTRY: https://registry.npmjs.org

jobs:
  publish:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          # Même ordre que workflow_dispatch.options (sauf "all")
          - "@portaki/module-train"
          - "@portaki/module-events"
          - "@portaki/module-checklist"
          - "@portaki/module-rules"
          - "@portaki/module-appliances"
          - "@portaki/module-facility-hours"
          - "@portaki/module-wifi-guest"
          - "@portaki/module-waste-recycling"
          - "@portaki/module-local-guide"
          - "@portaki/module-weather"
          - "@portaki/module-access-guide"
          - "@portaki/module-emergency-contacts"
          - "@portaki/module-pre-arrival-form"
          - "@portaki/module-ical-sync"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert no file: dependencies in packages
        run: pnpm assert-no-file-deps

      # Trusted Publishing (OIDC): pnpm publish délègue au npm fourni par Node 24 — pas de NPM_TOKEN.
      - name: Publish ${{ matrix.package }}
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${{ github.event.inputs.npm_package }}"
          PKG="${{ matrix.package }}"
          if [[ "$TARGET" != "all" && "$TARGET" != "$PKG" ]]; then
            echo "Skip $PKG (sélection: $TARGET)"
            exit 0
          fi
          pnpm publish --filter "$PKG" --access public --no-git-checks
