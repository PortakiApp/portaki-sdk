# Publishes portaki-module-sdk Java JAR as a scratch OCI image on GHCR.
# Image: ghcr.io/<owner>/portaki-module-sdk:<version>
# Optional alternative to Maven Central for tooling; runtime modules use portaki-module-<id> images.

name: Publish SDK Java (GHCR)

run-name: ghcr-sdk-java-${{ github.run_id }}

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - sdk/java/**

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-sdk-java-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: portaki-module-sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Package SDK JAR
        working-directory: sdk/java
        run: mvn -q -B package -DskipTests

      - name: Resolve version
        id: meta
        working-directory: sdk/java
        run: |
          version="$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout | tr -d '\r')"
          version="${version%-SNAPSHOT}"
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner}/portaki-module-sdk:${version}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          set -euo pipefail
          jar="$(find sdk/java/target -maxdepth 1 -name 'portaki-module-sdk-*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -1)"
          build_dir="$(mktemp -d)"
          cp "${jar}" "${build_dir}/portaki-module-sdk.jar"
          cat > "${build_dir}/Dockerfile" <<'DOCKERFILE'
FROM scratch
COPY portaki-module-sdk.jar /portaki-module-sdk.jar
DOCKERFILE
          docker build -t "${{ steps.meta.outputs.image }}" "${build_dir}"
          docker push "${{ steps.meta.outputs.image }}"
