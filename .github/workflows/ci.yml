name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "sdk/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "sdk/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      javascript: ${{ steps.filter.outputs.javascript }}
      java: ${{ steps.filter.outputs.java }}
      packages: ${{ steps.filter.outputs.packages }}
      pre_arrival_backend: ${{ steps.filter.outputs.pre_arrival_backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            javascript:
              - 'sdk/javascript/**'
              - '.github/workflows/**'
            java:
              - 'sdk/java/**'
              - '.github/workflows/**'
            packages:
              - 'packages/**'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.github/workflows/**'
            pre_arrival_backend:
              - 'sdk/java/**'
              - 'packages/pre-arrival-form/backend/**'
              - '.github/workflows/**'

  javascript:
    name: JavaScript — SDK build
    needs: changes
    if: needs.changes.outputs.javascript == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/javascript

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/javascript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  java:
    name: Java — SDK verify
    needs: changes
    if: needs.changes.outputs.java == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/java

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Maven verify
        run: mvn -B -ntp verify

  packages-lint:
    name: pnpm — workspace lint (packages)
    needs: changes
    if: needs.changes.outputs.packages == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  pre-arrival-backend:
    name: Maven verify (pre-arrival-form backend)
    needs: changes
    if: needs.changes.outputs.pre_arrival_backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install portaki-module-sdk (local)
        working-directory: sdk/java
        run: mvn -B -ntp install -DskipTests

      - name: Verify backend
        working-directory: packages/pre-arrival-form/backend
        run: mvn -B -ntp verify
