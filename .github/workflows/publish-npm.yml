name: Publish JavaScript SDK (npmjs)

on:
  push:
    branches: [develop]
    paths:
      - "sdk/javascript/**"
      - ".github/workflows/publish-npm.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version semver (e.g. 0.2.0). Leave empty to use package.json version."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: publish-npm-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: npm publish — @portakiapp/module-sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/javascript

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Unique semver for push (no prerelease suffix)
        if: github.event_name == 'push'
        shell: bash
        run: |
          BASE="$(node -p "require('./package.json').version.replace(/[-+].*$/,'')")"
          MM="${BASE%.*}"
          npm version "${MM}.${{ github.run_number }}" --no-git-tag-version --allow-same-version

      - name: Apply manual version (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: npm version "${{ github.event.inputs.version }}" --no-git-tag-version --allow-same-version

      - name: Version from GitHub Release tag
        if: github.event_name == 'release'
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          RAW="${TAG#javascript-v}"
          RAW="${RAW#js-v}"
          RAW="${RAW#sdk-js-v}"
          RAW="${RAW#v}"
          npm version "$RAW" --no-git-tag-version --allow-same-version

      - name: Build
        run: npm run build

      - name: Publish to npmjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
