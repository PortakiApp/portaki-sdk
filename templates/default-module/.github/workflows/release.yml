name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install portaki CLI
        run: cargo install --path ../../../crates/portaki-cli --locked
      - run: portaki build --release
      - run: portaki lint
      - run: portaki publish --registry rg.fr-par.scw.cloud/portaki-modules
