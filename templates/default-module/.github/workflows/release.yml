name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install portaki CLI
        run: cargo install --path ../../../crates/portaki-cli --locked
      - run: portaki build --release
      - run: portaki lint
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: portaki publish --registry ghcr.io/portakiapp/portaki-modules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
